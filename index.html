<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rahul Saini - Senior React Native Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: '#F7F7F5',
              ink: {
                900: '#1C1C1C', // Soft Black
                800: '#2D2D2D', // Dark Gray
                600: '#575757', // Muted Gray
                400: '#9CA3AF', // Light Gray
                200: '#E5E5E5', // Divider
              },
              accent: {
                blue: '#4B6E91', // Desaturated Blue for links
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            },
            typography: {
              DEFAULT: {
                css: {
                  color: '#2D2D2D',
                  maxWidth: '100%',
                },
              },
            },
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #F7F7F5;
        color: #2D2D2D;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Hide scrollbar for lightbox but keep functionality */
      .no-scroll {
        overflow: hidden;
      }
      
      /* Hide scrollbar for mobile nav but allow scrolling */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @media print {
        .no-print {
          display: none !important;
        }
        body {
          background-color: white;
        }
        /* Ensure content width is maximized in print */
        main {
          max-width: 100% !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "lucide-react": "https://esm.sh/lucide-react@^0.574.0"
  }
}
</script>
